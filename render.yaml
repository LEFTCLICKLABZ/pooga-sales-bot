services:
  - type: worker
    name: pooga-labs-sales-bot
    runtime: node
    plan: starter
    region: oregon
    branch: main
    autoDeployTrigger: commit
    buildCommand: npx --yes pnpm@11.5.3 install --frozen-lockfile
    startCommand: npm start
    disk:
      name: sales-bot-state
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DRY_RUN
        value: "false"
      - key: POST_IMAGES
        value: "true"
      - key: REQUIRE_IMAGES
        value: "true"
      - key: OPENSEA_POLL_ENABLED
        value: "true"
      - key: OPENSEA_POLL_INTERVAL_MS
        value: "60000"
      - key: OPENSEA_POLL_LOOKBACK_MS
        value: "7200000"
      - key: OPENSEA_POLL_MAX_SALES
        value: "10"
      - key: ENS_LOOKUP
        value: "false"
      - key: ENS_TIMEOUT_MS
        value: "1500"
      - key: RETRY_INTERVAL_MS
        value: "300000"
      - key: RETRY_BATCH_SIZE
        value: "1"
      - key: MAX_PENDING_SALES
        value: "250"
      - key: PENDING_MAX_AGE_MS
        value: "7200000"
      - key: X_POST_INTERVAL_MS
        value: "30000"
      - key: X_FORBIDDEN_BACKOFF_MS
        value: "3600000"
      - key: X_AUTH_MODE
        value: oauth2
      - key: IGNORE_SALES_BEFORE
        value: "2026-06-24T01:22:16Z"
      - key: STATE_FILE
        value: /var/data/posted-sales.json
      - key: OPENSEA_COLLECTION_SLUGS
        value: rockbottomofficial
      - key: COLLECTION_LABELS
        value: "rockbottomofficial:ROCK BOTTOM"
      - key: HASHTAGS
        value: ""
      - key: X_EXPECTED_USERNAME
        value: poogalabs
      - key: OPENSEA_API_KEY
        sync: false
      - key: X_API_KEY
        sync: false
      - key: X_API_SECRET
        sync: false
      - key: X_ACCESS_TOKEN
        sync: false
      - key: X_ACCESS_SECRET
        sync: false
      - key: ETH_RPC_URL
        sync: false
      - key: X_OAUTH2_CLIENT_ID
        sync: false
      - key: X_OAUTH2_CLIENT_SECRET
        sync: false
      - key: X_OAUTH2_ACCESS_TOKEN
        sync: false
      - key: X_OAUTH2_REFRESH_TOKEN
        sync: false
